name: Web

on:
  push:
    branches: [main]
    paths:
      - "web/**"
      - "playground-wasm/**"
      - "compiler/crates/ast/**"
      - "compiler/crates/lexer/**"
      - "compiler/crates/parser/**"
      - "compiler/crates/emit-js/**"
      - "compiler/crates/wasm/**"
      - "tests/wasm-smoke.cjs"
      - "examples/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "package.json"
      - "bun.lock"
      - "biome.json"
      - ".github/workflows/web.yml"
      - ".github/actions/setup-thailang/**"
  pull_request:
    branches: [main]
    paths:
      - "web/**"
      - "playground-wasm/**"
      - "compiler/crates/ast/**"
      - "compiler/crates/lexer/**"
      - "compiler/crates/parser/**"
      - "compiler/crates/emit-js/**"
      - "compiler/crates/wasm/**"
      - "tests/wasm-smoke.cjs"
      - "examples/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "package.json"
      - "bun.lock"
      - "biome.json"
      - ".github/workflows/web.yml"
      - ".github/actions/setup-thailang/**"

concurrency:
  group: web-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  check:
    name: biome + wasm + next build + smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-thailang
        with:
          wasm-pack: "true"
          bun: "true"
          bun-install: "true"
      - name: Build WASM (nodejs + web targets)
        run: bun run --filter playground-wasm build:all
      - name: Biome
        run: bunx biome ci .
      - name: Next build
        run: bun run --filter web build
      - name: WASM smoke test
        run: node tests/wasm-smoke.cjs
