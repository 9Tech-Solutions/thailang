name: Publish npm

# Triggered by pushing a git tag matching `v*` (e.g. `v0.1.0`). The tag
# version must match `npm-cli/package.json` — the `verify-version` step
# gates on this so nobody ships a tag that disagrees with the manifest.
#
# Also exposes `workflow_dispatch` with a `dry_run` toggle so you can
# validate the pack layout without actually publishing.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Pack + verify only — skip the actual npm publish"
        type: boolean
        default: false

# Opt all JS-based actions onto Node 24. GitHub deprecates the Node 20
# runtime in June 2026; forcing Node 24 now makes the upgrade a no-op
# when the deprecation actually lands and silences the per-run warning.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      # Required for `npm publish --provenance`. Works alongside the
      # classic NPM_TOKEN secret — npm signs the provenance statement
      # using the GitHub OIDC token, not the npm token.
      id-token: write

    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-thailang
        with:
          node: "true"
          node-registry-url: "https://registry.npmjs.org"
          bun: "true"
          wasm32-target: "true"
          wasm-pack: "true"

      - name: Verify tag matches package.json
        if: github.event_name == 'push'
        shell: bash
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          PKG_VERSION=$(node -p "require('./npm-cli/package.json').version")
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::Tag v$TAG_VERSION does not match npm-cli/package.json version $PKG_VERSION"
            echo "Bump npm-cli/package.json to $TAG_VERSION, commit, and re-tag."
            exit 1
          fi
          echo "OK: tag v$TAG_VERSION matches package.json"

      - name: Cargo test (safety gate)
        run: cargo test --workspace

      # ── Decide whether each of the two names needs publishing ───────────
      #
      # We ship under two names from one source:
      # - `thailang`                   (unscoped — canonical short name)
      # - `@9tech.solutions/thailang`  (scoped — shows on the org's page)
      #
      # Each version is only publishable once per name, so we pre-check npm
      # to skip gracefully on reruns. Avoids spurious failures when only one
      # of the two names has been bumped, or when a previous run published
      # one but failed on the other.

      - name: Check if versions already published
        id: check
        shell: bash
        run: |
          CURRENT=$(node -p "require('./npm-cli/package.json').version")
          echo "current=$CURRENT" >> $GITHUB_OUTPUT

          UNSCOPED_PUBLISHED=$(npm view thailang@$CURRENT version 2>/dev/null || echo "")
          SCOPED_PUBLISHED=$(npm view "@9tech.solutions/thailang@$CURRENT" version 2>/dev/null || echo "")

          if [ -z "$UNSCOPED_PUBLISHED" ]; then
            echo "publish_unscoped=true" >> $GITHUB_OUTPUT
            echo "[check] thailang@$CURRENT — not yet published"
          else
            echo "publish_unscoped=false" >> $GITHUB_OUTPUT
            echo "[check] thailang@$CURRENT — already on npm, skipping"
          fi

          if [ -z "$SCOPED_PUBLISHED" ]; then
            echo "publish_scoped=true" >> $GITHUB_OUTPUT
            echo "[check] @9tech.solutions/thailang@$CURRENT — not yet published"
          else
            echo "publish_scoped=false" >> $GITHUB_OUTPUT
            echo "[check] @9tech.solutions/thailang@$CURRENT — already on npm, skipping"
          fi

      # ── Dry run (manual only) ───────────────────────────────────────────

      - name: Publish — dry run (unscoped)
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.dry_run == 'true'
        working-directory: npm-cli
        run: npm publish --provenance --access public --dry-run
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # ── Real publish — unscoped first, then mutate name and publish scoped ──

      - name: Publish (unscoped — `thailang`)
        if: (github.event_name == 'push' || github.event.inputs.dry_run != 'true') && steps.check.outputs.publish_unscoped == 'true'
        working-directory: npm-cli
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Rewrite package.json → scoped name
        if: (github.event_name == 'push' || github.event.inputs.dry_run != 'true') && steps.check.outputs.publish_scoped == 'true'
        working-directory: npm-cli
        run: |
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.name = '@9tech.solutions/thailang';
            pkg.publishConfig = { access: 'public' };
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + String.fromCharCode(10));
          "
          echo '[rewrite] package.json now pinned to @9tech.solutions/thailang'
          node -e "console.log(require('./package.json').name)"

      - name: Publish (scoped alias — `@9tech.solutions/thailang`)
        if: (github.event_name == 'push' || github.event.inputs.dry_run != 'true') && steps.check.outputs.publish_scoped == 'true'
        working-directory: npm-cli
        # --ignore-scripts skips the prepack rebuild — wasm/ is already
        # populated from the unscoped publish above, and rebuilding would
        # be wasteful + could race the fresh provenance signature.
        run: npm publish --provenance --access public --ignore-scripts
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Summary
        if: success()
        run: |
          VERSION="${{ steps.check.outputs.current }}"
          echo "## 📦 Published thailang@$VERSION" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.check.outputs.publish_unscoped }}" = "true" ]; then
            echo "- ✅ https://www.npmjs.com/package/thailang" >> $GITHUB_STEP_SUMMARY
          else
            echo "- ↩️  thailang@$VERSION already published (skipped)" >> $GITHUB_STEP_SUMMARY
          fi
          if [ "${{ steps.check.outputs.publish_scoped }}" = "true" ]; then
            echo "- ✅ https://www.npmjs.com/package/@9tech.solutions/thailang" >> $GITHUB_STEP_SUMMARY
          else
            echo "- ↩️  @9tech.solutions/thailang@$VERSION already published (skipped)" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Install:** \`npm i -g thailang\` · \`npm i -g @9tech.solutions/thailang\`" >> $GITHUB_STEP_SUMMARY
